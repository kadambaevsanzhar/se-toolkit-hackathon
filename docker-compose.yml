services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: grader
      POSTGRES_DB: grader_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grader"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://grader:grader@db:5432/grader_dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_ANALYZER_MODEL: ${OPENAI_ANALYZER_MODEL:-qwen/qwen3-vl-8b-instruct}
      OPENAI_VALIDATOR_MODEL: ${OPENAI_VALIDATOR_MODEL:-gpt-4.1-mini}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-90}
      AI_MAX_SCORE: 10
      MAX_UPLOAD_SIZE_MB: 10
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  bot:
    build: ./bot
    depends_on:
      backend:
        condition: service_started
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-placeholder}
      BACKEND_URL: http://backend:8000
      ANALYSIS_TIMEOUT: 150
      DISPLAY_TZ: Europe/Moscow
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000

volumes:
  postgres_data:
