services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: grader
      POSTGRES_DB: grader_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grader"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://grader:grader@db:5432/grader_dev
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:42006/v1}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-qwen3-coder-plus}
      AI_MAX_SCORE: ${AI_MAX_SCORE:-10}
      AI_TIMEOUT: ${AI_TIMEOUT:-30}
      MAX_UPLOAD_SIZE_MB: 10
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  bot:
    build: ./bot
    depends_on:
      backend:
        condition: service_started
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      BACKEND_URL: http://backend:8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://backend:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000

volumes:
  postgres_data:
